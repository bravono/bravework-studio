name: Database Migration

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to migrate"
        required: false
        default: "Production"
        type: choice
        options:
          - Staging
          - Production

jobs:
  migrate:
    name: Apply Database Migrations
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'Production' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # satisfy prisma.config.ts during postinstall
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

      - name: Verify Database Secret
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is missing. Please check your GitHub Repository Settings > Environments or Secrets."
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma Migrate Deploy
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
